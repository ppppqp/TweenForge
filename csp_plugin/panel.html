<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TweenForge</title>
<style>
  :root {
    --bg: #2b2b2b;
    --bg-card: #353535;
    --bg-hover: #404040;
    --text: #e0e0e0;
    --text-muted: #999;
    --accent: #5b9bd5;
    --accent-hover: #4a8bc4;
    --error: #d55b5b;
    --success: #5bd565;
    --border: #444;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    user-select: none;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .panel-header h1 {
    font-size: 14px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--error);
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.connected { background: var(--success); }

  /* -- Sections -- */
  .section {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 10px;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  /* -- Frame selector -- */
  .frame-selector {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .frame-input-group {
    flex: 1;
  }
  .frame-input-group label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .frame-input-group input {
    width: 100%;
    padding: 5px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    text-align: center;
  }
  .frame-input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .frame-arrow {
    color: var(--text-muted);
    font-size: 16px;
    margin-top: 14px;
  }

  /* -- Settings -- */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row label {
    font-size: 11px;
    flex-shrink: 0;
  }
  .setting-row select,
  .setting-row input[type="number"] {
    padding: 4px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    width: 120px;
  }
  .setting-row select:focus,
  .setting-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .checkbox-row input[type="checkbox"] {
    accent-color: var(--accent);
  }

  /* -- Preview strip -- */
  .preview-strip {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 6px 0;
    min-height: 80px;
    align-items: center;
  }
  .preview-frame {
    flex-shrink: 0;
    width: 64px;
    text-align: center;
  }
  .preview-frame img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    background: #1a1a1a;
    border-radius: 4px;
    border: 2px solid transparent;
  }
  .preview-frame.key img {
    border-color: var(--accent);
  }
  .preview-frame.generated img {
    border-color: var(--success);
    opacity: 0.9;
  }
  .preview-frame .frame-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .preview-empty {
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    width: 100%;
    padding: 20px 0;
  }

  /* -- Progress -- */
  .progress-bar {
    height: 3px;
    background: var(--bg);
    border-radius: 2px;
    margin: 8px 0;
    overflow: hidden;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .status-text {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    min-height: 14px;
  }

  /* -- Buttons -- */
  .button-row {
    display: flex;
    gap: 6px;
  }
  .btn {
    flex: 1;
    padding: 7px 12px;
    border: none;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--bg-hover);
    color: var(--text);
  }
  .btn-secondary:hover:not(:disabled) { background: #4a4a4a; }
  .btn-success {
    background: var(--success);
    color: #1a1a1a;
  }
  .btn-success:hover:not(:disabled) { background: #4cc44f; }

  /* -- Playback -- */
  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 0;
  }
  .playback-btn {
    width: 28px; height: 28px;
    border: none;
    border-radius: 50%;
    background: var(--bg-hover);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .playback-btn:hover { background: #4a4a4a; }
</style>
</head>
<body>

<!-- Header -->
<div class="panel-header">
  <h1>TweenForge</h1>
  <div>
    <span class="status-dot" id="statusDot"></span>
    <span id="statusLabel" style="font-size:10px;color:var(--text-muted);">Disconnected</span>
  </div>
</div>

<!-- Frame Selection -->
<div class="section">
  <div class="section-title">Key Frames</div>
  <div class="frame-selector">
    <div class="frame-input-group">
      <label>Start Frame</label>
      <input type="number" id="frameA" min="1" value="1" />
    </div>
    <span class="frame-arrow">&rarr;</span>
    <div class="frame-input-group">
      <label>End Frame</label>
      <input type="number" id="frameB" min="2" value="5" />
    </div>
  </div>
</div>

<!-- Settings -->
<div class="section">
  <div class="section-title">Settings</div>
  <div class="setting-row">
    <label>Inbetweens</label>
    <input type="number" id="numInbetweens" min="1" max="24" value="3" />
  </div>
  <div class="setting-row">
    <label>Easing</label>
    <select id="easing">
      <option value="linear">Linear</option>
      <option value="ease_in">Ease In (Slow Start)</option>
      <option value="ease_out">Ease Out (Slow End)</option>
      <option value="ease_in_out" selected>Ease In-Out</option>
    </select>
  </div>
  <div class="setting-row">
    <div class="checkbox-row">
      <input type="checkbox" id="lineartMode" />
      <label for="lineartMode">Line art cleanup</label>
    </div>
  </div>
</div>

<!-- Generate Button -->
<div class="button-row" style="margin-bottom:10px;">
  <button class="btn btn-primary" id="btnGenerate" onclick="onGenerate()">
    Generate Preview
  </button>
</div>

<!-- Progress -->
<div class="progress-bar" id="progressBar">
  <div class="fill" id="progressFill"></div>
</div>
<div class="status-text" id="statusText"></div>

<!-- Preview -->
<div class="section" id="previewSection" style="display:none;">
  <div class="section-title">Preview</div>
  <div class="preview-strip" id="previewStrip">
    <div class="preview-empty">Generate to see preview</div>
  </div>

  <!-- Playback -->
  <div class="playback-controls">
    <button class="playback-btn" onclick="playbackPrev()" title="Previous frame">&#9664;</button>
    <button class="playback-btn" id="btnPlay" onclick="playbackToggle()" title="Play/Pause">&#9654;</button>
    <button class="playback-btn" onclick="playbackNext()" title="Next frame">&#9654;</button>
  </div>

  <!-- Accept / Reject -->
  <div class="button-row" style="margin-top:8px;">
    <button class="btn btn-success" id="btnAccept" onclick="onAccept()">
      Import to Timeline
    </button>
    <button class="btn btn-secondary" id="btnReject" onclick="onReject()">
      Discard
    </button>
  </div>
</div>

<script>
// =========================================================================
// TweenForge Panel — shared UI logic
//
// This script is host-agnostic. It communicates with the host app via
// a `HostBridge` object that must be injected before this panel loads.
// See tweenforge.js (CSP) or index.js (Photoshop) for implementations.
//
// HostBridge interface:
//   .getServerUrl()           → string
//   .exportFrame(num, path)   → Promise<string>  (returns actual path)
//   .importFrame(path, num)   → Promise<void>
//   .getTempDir()             → string
//   .onReady()                → called when panel is initialized
// =========================================================================

var serverUrl = "http://127.0.0.1:9817";
var previewData = null;  // last PreviewResponse from server
var playbackTimer = null;
var playbackIndex = 0;
var allPreviewImages = [];  // ordered: [keyA, gen0, gen1, ..., keyB]

// -- Server communication -------------------------------------------------

function checkServer() {
  fetch(serverUrl + "/health")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById("statusDot").classList.add("connected");
      document.getElementById("statusLabel").textContent = "Connected (" + data.device + ")";
    })
    .catch(function() {
      document.getElementById("statusDot").classList.remove("connected");
      document.getElementById("statusLabel").textContent = "Disconnected";
    });
}

function setProgress(pct, msg) {
  var bar = document.getElementById("progressBar");
  var fill = document.getElementById("progressFill");
  var text = document.getElementById("statusText");
  if (pct > 0) {
    bar.classList.add("active");
    fill.style.width = (pct * 100) + "%";
  } else {
    bar.classList.remove("active");
    fill.style.width = "0%";
  }
  text.textContent = msg || "";
}

// -- Generate & Preview ---------------------------------------------------

function onGenerate() {
  var frameA = parseInt(document.getElementById("frameA").value, 10);
  var frameB = parseInt(document.getElementById("frameB").value, 10);
  var numInbetweens = parseInt(document.getElementById("numInbetweens").value, 10);
  var easing = document.getElementById("easing").value;
  var lineartMode = document.getElementById("lineartMode").checked;

  if (frameB <= frameA) {
    setProgress(0, "End frame must be after start frame.");
    return;
  }

  document.getElementById("btnGenerate").disabled = true;
  setProgress(0.1, "Exporting key frames...");

  // Ask the host to export, then call server preview endpoint
  var tempDir = (typeof HostBridge !== "undefined") ? HostBridge.getTempDir() : "/tmp/tweenforge";
  var sessionId = Date.now();
  var exportDir = tempDir + "/export_" + sessionId;
  var outputDir = tempDir + "/output_" + sessionId;

  var exportPromise;
  if (typeof HostBridge !== "undefined" && HostBridge.exportFrame) {
    exportPromise = Promise.all([
      HostBridge.exportFrame(frameA, exportDir + "/key_" + frameA + ".png"),
      HostBridge.exportFrame(frameB, exportDir + "/key_" + frameB + ".png"),
    ]);
  } else {
    // Fallback: assume frames are already exported (CLI/debug mode)
    exportPromise = Promise.resolve([
      exportDir + "/key_" + frameA + ".png",
      exportDir + "/key_" + frameB + ".png",
    ]);
  }

  exportPromise
    .then(function(paths) {
      setProgress(0.3, "Generating inbetweens...");
      return fetch(serverUrl + "/interpolate/preview", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          frame_a_path: paths[0],
          frame_b_path: paths[1],
          num_inbetweens: numInbetweens,
          easing: easing,
          lineart_mode: lineartMode,
          output_dir: outputDir,
          thumbnail_size: 128,
        }),
      });
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== "complete") {
        throw new Error(data.error || "Generation failed");
      }
      previewData = data;
      renderPreview(data);
      setProgress(0, "");
      document.getElementById("previewSection").style.display = "block";
      document.getElementById("btnGenerate").disabled = false;
    })
    .catch(function(err) {
      setProgress(0, "Error: " + err.message);
      document.getElementById("btnGenerate").disabled = false;
    });
}

function renderPreview(data) {
  var strip = document.getElementById("previewStrip");
  strip.innerHTML = "";
  allPreviewImages = [];

  // Key frame A
  var divA = makePreviewThumb(data.key_frame_a_thumb, "Key A", "key");
  strip.appendChild(divA);
  allPreviewImages.push(data.key_frame_a_thumb);

  // Generated frames
  for (var i = 0; i < data.frames.length; i++) {
    var f = data.frames[i];
    var div = makePreviewThumb(f.thumbnail_base64, "tw " + (i + 1), "generated");
    strip.appendChild(div);
    allPreviewImages.push(f.thumbnail_base64);
  }

  // Key frame B
  var divB = makePreviewThumb(data.key_frame_b_thumb, "Key B", "key");
  strip.appendChild(divB);
  allPreviewImages.push(data.key_frame_b_thumb);
}

function makePreviewThumb(b64, label, cssClass) {
  var div = document.createElement("div");
  div.className = "preview-frame " + cssClass;

  var img = document.createElement("img");
  img.src = "data:image/png;base64," + b64;
  div.appendChild(img);

  var lbl = document.createElement("div");
  lbl.className = "frame-label";
  lbl.textContent = label;
  div.appendChild(lbl);

  return div;
}

// -- Playback -------------------------------------------------------------

function playbackToggle() {
  if (playbackTimer) {
    clearInterval(playbackTimer);
    playbackTimer = null;
    document.getElementById("btnPlay").innerHTML = "&#9654;";
  } else {
    playbackIndex = 0;
    highlightPreviewFrame(0);
    playbackTimer = setInterval(function() {
      playbackIndex = (playbackIndex + 1) % allPreviewImages.length;
      highlightPreviewFrame(playbackIndex);
    }, 120);  // ~8fps playback
    document.getElementById("btnPlay").innerHTML = "&#9646;&#9646;";
  }
}

function playbackPrev() {
  if (allPreviewImages.length === 0) return;
  playbackIndex = (playbackIndex - 1 + allPreviewImages.length) % allPreviewImages.length;
  highlightPreviewFrame(playbackIndex);
}

function playbackNext() {
  if (allPreviewImages.length === 0) return;
  playbackIndex = (playbackIndex + 1) % allPreviewImages.length;
  highlightPreviewFrame(playbackIndex);
}

function highlightPreviewFrame(idx) {
  var frames = document.querySelectorAll(".preview-frame");
  for (var i = 0; i < frames.length; i++) {
    frames[i].style.opacity = (i === idx) ? "1" : "0.4";
  }
}

// -- Accept / Reject ------------------------------------------------------

function onAccept() {
  if (!previewData || !previewData.frames.length) return;

  document.getElementById("btnAccept").disabled = true;
  setProgress(0.1, "Importing frames...");

  var frames = previewData.frames;
  var importNext = function(i) {
    if (i >= frames.length) {
      setProgress(0, "Imported " + frames.length + " frame(s).");
      document.getElementById("previewSection").style.display = "none";
      previewData = null;
      document.getElementById("btnAccept").disabled = false;
      return;
    }
    setProgress((i + 1) / frames.length, "Importing frame " + (i + 1) + "...");

    if (typeof HostBridge !== "undefined" && HostBridge.importFrame) {
      HostBridge.importFrame(frames[i].image_path, frames[i].target_frame_number)
        .then(function() { importNext(i + 1); })
        .catch(function(err) { setProgress(0, "Import error: " + err.message); });
    } else {
      // No host bridge — just log
      console.log("Would import", frames[i].image_path, "at frame", frames[i].target_frame_number);
      importNext(i + 1);
    }
  };
  importNext(0);
}

function onReject() {
  previewData = null;
  document.getElementById("previewSection").style.display = "none";
  setProgress(0, "Preview discarded.");
  if (playbackTimer) {
    clearInterval(playbackTimer);
    playbackTimer = null;
  }
}

// -- Init -----------------------------------------------------------------

if (typeof HostBridge !== "undefined" && HostBridge.getServerUrl) {
  serverUrl = HostBridge.getServerUrl();
}
checkServer();
setInterval(checkServer, 10000);

if (typeof HostBridge !== "undefined" && HostBridge.onReady) {
  HostBridge.onReady();
}
</script>

</body>
</html>
